spring:
  application:
    name: jifelog-gateway
  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - SecureHeaders
          filter:
            secure-headers:
              strict-transport-security: max-age=31536000 ; includeSubDomains
              referrer-policy: no-referrer
              permissions-policy: camera=(), geolocation=(), microphone=()
              xss-protection-header: "0"
          global-cors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                allowed-origin-patterns:
                  - "https://*.jifelog.com"
                  - "https://jifelog.com"
                allowed-methods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowed-headers: "*"
                allow-credentials: true
                max-age: 3600
          routes:
            - id: auth-api
              uri: http://auth-api.${spring.profiles.active}-jifelog-com.svc.cluster.local
              predicates:
                - Path=/auth/**
              filters:
                - StripPrefix=1
  data:
    redis:
      host: ${JIFELOG_REDIS_HOST}
      password: ${JIFELOG_REDIS_PASSWORD}

server:
  reactive:
    session:
      cookie:
        http-only: true
        same-site: lax
        secure: true

jifelog:
  jwt:
    secret: ${JIFELOG_JWT_SECRET}
    issuer: gateway.jifelog.com
    audience: jifelog-internal-services
    header-name: X-Jifelog-JWT
    ttl-seconds: 60

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health
