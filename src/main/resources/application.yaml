spring:
  application:
    name: jifelog-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-api
              uri: http://auth-service.default.svc.cluster.local:8080
              predicates:
                - Path=/auth/**
              filters:
                - StripPrefix=1

jifelog:
  jwt:
    secret: ${GATEWAY_JWT_SECRET}
    issuer: jifelog-gateway
    audience: jifelog-internal-services
    header-name: X-Jifelog-JWT
    ttl-seconds: 60
